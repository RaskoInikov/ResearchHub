spring:
  application:
    name: rams
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/researchhub}
    username: ${DB_USER:research_user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true