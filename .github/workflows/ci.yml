name: CI/CD

on:
  push:
    branches: [ "master" ]

env:
  BACKEND_URL: ${{ secrets.BACKEND_URL }}

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: ./gradlew clean assemble

  test:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rams
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests
        run: ./gradlew test || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  healthcheck:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Wait for deployment
        run: |
          echo "Waiting for backend to boot..."
          sleep 40

      - name: Healthcheck with retries
        run: |
          URL="$BACKEND_URL/actuator/health"

          echo "Checking health endpoint: $URL"

          for i in {1..5}; do
            STATUS=$(curl -s -o response.txt -w "%{http_code}" $URL || true)

            echo "Attempt $i → HTTP $STATUS"
            echo "Response:"
            cat response.txt

            if [ "$STATUS" -eq 200 ]; then
              echo "Backend is healthy"
              exit 0
            fi

            echo "Not ready yet... retrying in 5s"
            sleep 5
          done

          echo "Backend failed healthcheck after retries"
          exit 1

      - name: Root endpoint check
        run: |
          URL="$BACKEND_URL"

          echo "Checking root endpoint: $URL"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL || true)

          if [ "$STATUS" -eq 200 ]; then
            echo "Root endpoint OK"
          else
            echo "Root endpoint returned $STATUS"
          fi