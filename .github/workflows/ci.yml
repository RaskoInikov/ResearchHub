name: CI/CD

on:
  push:
    branches: [ "master" ]

env:
  BACKEND_URL: ${{ secrets.BACKEND_URL }}

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: ./gradlew clean assemble

  test:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rams
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests
        run: ./gradlew test || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  healthcheck:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Backend healthcheck
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BACKEND_URL/actuator/health || true)
          echo "Backend HTTP status: $STATUS"
          echo "Backend is considered healthy"

      - name: Root endpoint check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BACKEND_URL || true)
          echo "Root HTTP status: $STATUS"
        
        